kind = "web"
previewPath = "/"
title = "TournaX - Gaming Tournaments"
version = "1.0.0"
id = "artifacts/tournax"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25196

[services.development]
run = "pnpm --filter @workspace/tournax run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tournax", "run", "build" ]
publicDir = "artifacts/tournax/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25196"
BASE_PATH = "/"
